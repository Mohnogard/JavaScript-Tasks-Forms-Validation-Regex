<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Form</title>
    <link rel="stylesheet" href="task4.css" />
  </head>
  <style>
    
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  padding: 30px;
  font-family: Arial, Helvetica, sans-serif;
  background-color: #f1f1f1;
}

.container {
  width: 545px;
  margin: 0 auto;
  background-color: #f7f7f7;
  border-radius: 28px;
  box-shadow: 0 3px 12px rgba(0, 0, 0, 0.12);
  overflow: hidden;
  border: 1px solid #e3e3e3;
}

.form-header {
  background: linear-gradient(to right, #1d72d8, #1364cc);
  padding: 18px 20px 16px;
  text-align: center;
}

.form-header h1 {
  margin: 0;
  color: white;
  font-size: 21px;
  font-weight: 700;
}

.form-body {
  padding: 28px 30px 26px;
}

.name-row {
  display: flex;
  gap: 16px;
}

.field-group {
  margin-bottom: 14px;
}

.field-group.half {
  width: 50%;
}

label {
  display: block;
  margin-bottom: 7px;
  color: #4d5f79;
  font-size: 15px;
  font-weight: 700;
}

input {
  width: 100%;
  height: 36px;
  border: 2px solid #c9d1db;
  border-radius: 4px;
  padding: 6px 10px;
  font-size: 15px;
  background-color: #fff;
  color: #2d3c50;
}

input::placeholder {
  color: #566b86;
  font-weight: 700;
}

input:focus {
  outline: none;
  border-color: #7f9cc3;
}

.date-input-wrapper {
  position: relative;
}

.date-input-wrapper input {
  padding-right: 46px;
}

.calendar-box {
  position: absolute;
  top: 0;
  right: 0;
  width: 42px;
  height: 36px;
  border-left: 2px solid #c9d1db;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #51647e;
  font-size: 18px;
  pointer-events: none;
}

.error {
  display: block;
  min-height: 19px;
  margin-top: 6px;
  color: #bf4343;
  font-size: 13px;
  font-weight: 700;
  line-height: 1.35;
}

.register-btn {
  display: block;
  width: 320px;
  height: 44px;
  margin: 18px auto 20px;
  border: none;
  border-radius: 25px;
  background: linear-gradient(to right, #1f74da, #1667cf);
  color: white;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 5px 10px rgba(23, 101, 205, 0.25);
}

.register-btn:hover {
  opacity: 0.96;
}

.bottom-text {
  text-align: center;
  margin: 0;
  color: #3d4d67;
  font-size: 14px;
  font-weight: 500;
}
  </style>
  <body>
    <div class="container">
      <div class="form-header">
        <h1>Registration Form</h1>
      </div>

      <form id="registerForm" class="form-body" novalidate>
        <div class="name-row">
          <div class="field-group half">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" />
            <small class="error" id="firstNameError"></small>
          </div>

          <div class="field-group half">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" />
            <small class="error" id="lastNameError"></small>
          </div>
        </div>

        <div class="field-group">
          <label for="birthDate">Date of Birth</label>
          <div class="date-input-wrapper">
            <input type="date" id="birthDate" />
            <span class="calendar-box">📅</span>
          </div>
          <small class="error" id="birthDateError"></small>
        </div>

        <div class="field-group">
          <label for="email">Email Address</label>
          <input type="text" id="email" />
          <small class="error" id="emailError"></small>
        </div>

        <div class="field-group">
          <input type="text" id="confirmEmail" placeholder="Confirm Email" />
          <small class="error" id="confirmEmailError"></small>
        </div>

        <div class="field-group">
          <label for="password">Password</label>
          <input type="password" id="password" />
          <small class="error" id="passwordError"></small>
        </div>

        <div class="field-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" />
          <small class="error" id="confirmPasswordError"></small>
        </div>

        <button type="submit" class="register-btn">Register</button>

        <p class="bottom-text" id="bottomText">
          Please fix the errors above to submit the form.
        </p>
      </form>
    </div>

    <script src="./js/task4.js"></script>
  </body>
</html>
