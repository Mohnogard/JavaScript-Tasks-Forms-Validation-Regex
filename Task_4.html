<!DOCTYPE html>
<head>
    <title></title>
</head>

<style>

*{
    box-sizing: border-box;
}
body{
  margin: 20px;
    font-family: open sans ;
    color: rgb(0, 0, 165);
    font-weight: 700;
    font-size: small;
}



small {
  color: red;
  font-size: 12px;
  min-height: 14px; /* 🔥 prevents jumping */
}

/* Center the button */
button {
  display: block;
  margin: 15px auto;
  padding: 5px 15px;
  align-items: center;
}


.container {
  margin: 10px auto;
  width: 480px;
  padding: 30px;
  border-radius: 30px;
  border: none;
  box-shadow: 0px 0px 10px rgb(180, 180, 180) ;
  overflow: hidden;
}

.form {
  display: grid;
  column-gap: 20px;
  width: 100%;
  border-radius: 30px;
}

input {
  width: 100%;
  padding: 7px;
  box-shadow: inset 0px 1px 1px rgb(182, 182, 182);
  border: 1px solid #ccc;
  border-radius: 3px;
}


.bigentry{
    grid-column: span 2/1;
}


</style>

<body>
<div class="container">
<h2 style="text-align: center; background-color: rgb(72, 72, 247);padding-top: 80px;padding-bottom: 20px; color: white;margin: -80px -50px 30px -50px">Registration form</h2>
<form id="myForm" class="form">
        <!-- <div class="intro">
            Hello
        </div> -->

        <div>
First Name:<input id="firstname"  type="text"/>
<small id="firsterror"></small>
        </div>


        <div>
Last Name:<input  id="lastname" type="text"/>
<small id="lasterror"></small>
        </div>


        <div class="bigentry"style="margin:25px 0px;">
Date of Birth:<input  id="date"  type="date"/>
<small id="dateerror"></small>
        </div>
        

        <div class="bigentry">
Email address:<input  id="email1" type="text"/>
        </div>

        <div class="bigentry"  style="margin: 5px 0px 25px 0px;">
<input type="text"id="email2"placeholder='Confirm Email'/>
<small id="email2error"></small>
        </div>

        <div class="bigentry"style="margin-bottom: 25px;">
Input Password<input  id="pass1" type="password"/>
<small id="pass1error"></small>
        </div>

        <div class="bigentry"  style="margin-bottom: 25px;">
Confirm Password:<input id="pass2" type="password"/>
<small id="pass2error"></small>
        </div>

        <div class="bigentry" >
            <button style="color:white; width: 60%;background-color:rgb(72, 72, 247);border-radius: 30px;border: none;height:60%;font-size: large;font-weight: bold ;">Register</button>
            </div>
            
    </form>
    <div style="text-align: center;">    
        <small style="color: rgb(0, 0, 165);"> Please fix all errros before continuing</small>
</div>
</div>


    <script>
const myform = document.getElementById('myForm')

myform.addEventListener("submit", function(e){

e.preventDefault()

const first = document.getElementById("firstname")
const last = document.getElementById("lastname")
const date = document.getElementById("date")
const email1 = document.getElementById("email1")
const email2 = document.getElementById("email2")
const pass1 = document.querySelector("#pass1")
const pass2 = document.querySelector("#pass2")

const firsterr = document.getElementById("firsterror")
const lasterr = document.getElementById("lasterror")
const dateerr = document.getElementById("dateerror")
const mailerr = document.querySelector("#email2error")
const pass1err = document.getElementById("pass1error")
const pass2err = document.getElementById("pass2error")
const mainerr = document.querySelector("#mainerr")

let isValid = true
if (!/^[a-zA-Z]+$/.test(first.value)) {
    firsterr.textContent = "Letters only.";
    firsterr.style.color = "red";
    isValid = false;
} else {
    firsterr.textContent = "";
}
if (!/^[a-zA-Z]+$/.test(last.value)) {
    lasterr.textContent = "Letters only.";
    lasterr.style.color = "red";
    isValid = false;
} else {
    lasterror.textContent = "";
}

if(!date){
    dateerr="Invalid date"
    isValid=false;
}


if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email1.value)){
    mailerr.textContent = "Invalid email"
    mailerr.style.color = 'red'
    isValid=false} else {
     if (email1.value!=email2.value){
        mailerr.textContent = "Emails do not match";
        mailerr.style.color = "red";
        isValid = false;
} else {
    mailerr.textContent = "";
}}

if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email1.value)){
    mailerr.textContent = "Invalid email"
    mailerr.style.color = 'red'
    isValid=false}

if (!/^[A-Z](?=.*\d.*\d)(?=.*[!@#$%^&*])[A-Za-z\d!@#$%^&*]{7,31}$/.test(pass1.value)) {
    pass1err.textContent = "Passwords should start with a capital letter, include 2 numbers, 1 special character, and be 8-32 characters long"
    pass1err.style.color='red'
    isValid=false}
else {
    pass1err.textContent=''
}
if (pass1.value!=pass2.value){
    console.log(pass1.value)
    console.log(pass2.value)
    pass2err.textContent="Passwords do not match."
} else {
    pass2err.textContent=''
}

if(isValid){
    alert("all good")
} else if (isValid===false){
    first.textContent=''
    last.textContent=''
    email1.textContent=''
    email2.textContent=''
    pass1.textContent=''
    pass2.textContent=''

}

})

    </script>
</body>
